<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate of Excellence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @page {
            size: landscape;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            background-color: #f8f8f8;
        }

        .certificate-wrapper {
            width: 100vw;
            height: 100vh;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .certificate-content {
            width: 100%;
            height: 100%;
            background-color: white;
            border: 1px solid #ddd;
            box-sizing: border-box;
            padding: 3rem 4rem; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            text-align: center;
            color: #333333;
            position: relative;
        }

        .certificate-content::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 6px double #c7a152;
            pointer-events: none;
        }
        
        .certificate-header, .certificate-body, .certificate-footer {
            flex-shrink: 0;
            position: relative;
        }

        .certificate-header {
            padding-top: 1rem; 
        }
        .logo-container {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
        }

        .certificate-logo {
            margin-top: 30px;
            max-height: 45px;
            max-width: 280px;
            height: auto;
        }
        
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 38pt; 
            font-weight: 700;
            color: #1a237e; 
            margin-top: 1rem;
        }

        .presented-text {
            font-size: 12pt;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2.5rem;
        }

        .recipient-name {
            font-family: 'Playfair Display', serif;
            font-size: 44pt;
            font-weight: 700;
            color: #333; 
            margin: 1rem 0; 
            display: inline-block; 
            padding-bottom: 0.5rem; 
            border-bottom: 2px solid #eee; 
        }

        .achievement-text {
            font-size: 14pt;
            line-height: 1.6;
            color: #555;
            margin-top: 2.5rem;
        }

        .winning-amount {
            font-size: 16pt;
            font-weight: 700;
            margin-top: 1rem; 
            color: #4CAF50;
        }
        
        .certificate-footer {
            font-size: 10pt;
            color: #777;
            border-top: 1px solid #eee;
            padding-top: 1rem;
            margin-top: 1rem;
        }
        
    </style>
</head>
<body>
    <div class="certificate-wrapper">
        <div class="certificate-content">
            <div class="certificate-header">
                <div class="logo-container">
                    <img src="assets/reem-logo.png" alt="RAK Municipality REEM Logo" class="certificate-logo">
                </div>
            </div>

            <div class="certificate-body">
                <div class="main-title">🏆 Certificate of Excellence 🏆</div>

                <div class="presented-text">This is proudly awarded to</div>
                
                <div class="recipient-name">{{PLAYER_NAME}}</div>

                <div class="achievement-text">
                    for achieving the title of Sustainable Energy Ambassador by winning the </br>
                     <strong>“Mission Clean Energy”</strong>
                      challenge and collecting
                </div>
                <div class="winning-amount">
                    <strong>1,000,000 Reem Coins.</strong>
                </div>
            </div>

            <div class="certificate-footer">
                <span>Date: <script>document.write(new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }));</script></span>
            </div>
        </div>
    </div>
</body>
</html>
